name: Deploy to Yandex Cloud

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - prod
          - dev
      deploy_mode:
        description: 'legacy (YC) | gcp-cutover (migration) | gcp-only (Postgres-only)'
        required: true
        type: choice
        options:
          - legacy
          - gcp-cutover
          - gcp-only
        default: gcp-only
      skip_ydb_to_supabase:
        description: 'Skip YDB → Supabase data copy (full + incremental). Schema Goose step still runs.'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || (github.event_name == 'workflow_dispatch' && inputs.environment || 'prod') }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: 1.6.3
  GOOSE_VERSION: 3.26.0
  GO_VERSION: 1.21
  APP_CONFIG_PATH: config.json
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  GCP_TFSTATE_BUCKET: ${{ secrets.GCP_TFSTATE_BUCKET }}
  GCP_REGION: europe-west1

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && 'dev' || (github.event_name == 'workflow_dispatch' && inputs.environment || 'prod') }}
    outputs:
      cache_key: ${{ steps.set-cache-key.outputs.cache_key }}
      workspace: ${{ steps.set-workspace.outputs.workspace }}
      deploy_mode: ${{ steps.set-workspace.outputs.deploy_mode }}
      skip_ydb_migration: ${{ steps.set-workspace.outputs.skip_ydb_migration }}
      run_deploy: ${{ steps.set-workspace.outputs.run_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set workspace
        id: set-workspace
        run: |
          WORKSPACE=${{ github.event_name == 'pull_request' && 'dev' || (github.event_name == 'workflow_dispatch' && inputs.environment || 'prod') }}
          DEPLOY_MODE=${{ github.event_name == 'workflow_dispatch' && inputs.deploy_mode || 'gcp-only' }}
          SKIP_YDB=${{ github.event_name == 'workflow_dispatch' && inputs.skip_ydb_to_supabase || false }}
          RUN_DEPLOY=${{ github.event_name == 'workflow_dispatch' }}
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "deploy_mode=$DEPLOY_MODE" >> $GITHUB_OUTPUT
          echo "skip_ydb_migration=$SKIP_YDB" >> $GITHUB_OUTPUT
          echo "run_deploy=$RUN_DEPLOY" >> $GITHUB_OUTPUT
          echo "::notice::Workspace: $WORKSPACE"
          echo "::notice::Deploy mode: $DEPLOY_MODE"
          if [ "$SKIP_YDB" = "true" ]; then
            echo "::notice::YDB → Supabase data migration: skipped"
          fi

      - name: Set cache key
        id: set-cache-key
        run: |
          CACHE_KEY="${{ runner.os }}-${{ steps.set-workspace.outputs.workspace }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}"
          echo "cache_key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "::notice::Cache key: $CACHE_KEY"

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: ${{ steps.set-workspace.outputs.workspace }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ steps.set-cache-key.outputs.cache_key }}

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.ref_name }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-go-

      - name: Install revive
        run: go install github.com/mgechev/revive@latest

      - name: Run revive
        run: revive -config revive.toml -formatter friendly ./...

      - name: Test shared db package
        run: go test ./internal/db/...

      - name: Test proxy function
        run: go test ./...
        working-directory: proxy/function

      - name: Test dispatcher
        run: go test ./...
        working-directory: serverless/dispatcher

      - name: Test reminder
        run: go test ./...
        working-directory: serverless/reminder

      - name: Test loader
        run: go test ./...
        working-directory: serverless/loader

  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_deploy == 'true' && needs.setup.outputs.deploy_mode == 'legacy'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "${HOME}/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate YC CLI
        env:
          YC_SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          YC_CLOUD_ID: ${{ secrets.CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.FOLDER_ID }}
        run: |
          echo "$YC_SERVICE_ACCOUNT_KEY" > iam.json
          yc config set service-account-key iam.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Generate short-lived IAM token
        run: |
          export YDB_ACCESS_TOKEN=$(yc iam create-token)
          echo "YDB_ACCESS_TOKEN=$YDB_ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Install Goose
        run: |
          GOOSE_VERSION="${{ env.GOOSE_VERSION }}"
          wget -q "https://github.com/pressly/goose/releases/download/v${GOOSE_VERSION}/goose_linux_x86_64" -O goose
          chmod +x goose
          mkdir -p $HOME/.goose
          mv goose $HOME/.goose/
          echo "$HOME/.goose" >> $GITHUB_PATH

      - name: Load YC Terraform outputs
        uses: ./.github/actions/load-yc-terraform-outputs
        with:
          workspace: ${{ needs.setup.outputs.workspace }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cloud_id: ${{ secrets.CLOUD_ID }}
          folder_id: ${{ secrets.FOLDER_ID }}

      - name: Run Goose migrations
        env:
          GOOSE_DRIVER: ydb
        run: |
          export PATH="$HOME/.goose:$PATH"
          cd migrations
          GOOSE_DBSTRING="${GOOSE_DBSTRING_BASE}&token=${YDB_ACCESS_TOKEN}&go_query_mode=scripting&go_fake_tx=scripting&go_query_bind=declare,numeric"
          export GOOSE_DBSTRING
          echo "::notice::Running Goose migrations for ${{ needs.setup.outputs.workspace }} environment"
          goose up
        continue-on-error: false

  freeze-yc-cron:
    name: Freeze YC Reminder Cron
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_deploy == 'true' && needs.setup.outputs.deploy_mode == 'gcp-cutover'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "${HOME}/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate YC CLI
        env:
          YC_SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          YC_CLOUD_ID: ${{ secrets.CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.FOLDER_ID }}
        run: |
          echo "$YC_SERVICE_ACCOUNT_KEY" > iam.json
          yc config set service-account-key iam.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Disable YC reminder trigger
        run: |
          chmod +x _scripts/freeze-yc-cron.sh
          WORKSPACE=${{ needs.setup.outputs.workspace }} bash _scripts/freeze-yc-cron.sh

  migrate-schema-postgres:
    name: Postgres Schema Migration
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_deploy == 'true' && contains(fromJSON('["gcp-cutover","gcp-only"]'), needs.setup.outputs.deploy_mode)
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Goose
        run: |
          GOOSE_VERSION="${{ env.GOOSE_VERSION }}"
          wget -q "https://github.com/pressly/goose/releases/download/v${GOOSE_VERSION}/goose_linux_x86_64" -O goose
          chmod +x goose
          mkdir -p $HOME/.goose
          mv goose $HOME/.goose/
          echo "$HOME/.goose" >> $GITHUB_PATH

      - name: Run Postgres Goose migrations
        env:
          GOOSE_DRIVER: postgres
          GOOSE_DBSTRING: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          export PATH="$HOME/.goose:$PATH"
          cd migrations/postgres
          goose up

  migrate-db-full:
    name: Migrate YDB to Supabase (full)
    runs-on: ubuntu-latest
    needs: [setup, migrate-schema-postgres]
    if: |
      needs.setup.outputs.run_deploy == 'true' &&
      needs.setup.outputs.deploy_mode == 'gcp-cutover' &&
      needs.setup.outputs.skip_ydb_migration != 'true'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "${HOME}/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate YC CLI
        env:
          YC_SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          YC_CLOUD_ID: ${{ secrets.CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.FOLDER_ID }}
        run: |
          echo "$YC_SERVICE_ACCOUNT_KEY" > iam.json
          yc config set service-account-key iam.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Generate short-lived IAM token
        run: |
          export YDB_ACCESS_TOKEN=$(yc iam create-token)
          echo "YDB_ACCESS_TOKEN=$YDB_ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Load YC Terraform outputs
        uses: ./.github/actions/load-yc-terraform-outputs
        with:
          workspace: ${{ needs.setup.outputs.workspace }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cloud_id: ${{ secrets.CLOUD_ID }}
          folder_id: ${{ secrets.FOLDER_ID }}

      - name: Run full database migration
        env:
          YDB_ENDPOINT: ${{ env.YDB_ENDPOINT }}
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          YDB_TOKEN: ${{ env.YDB_ACCESS_TOKEN }}
        working-directory: _scripts/migrate-ydb-to-supabase
        run: go run . --mode=full

  deploy-gcp-infra:
    name: Deploy GCP Infrastructure (phase 1)
    runs-on: ubuntu-latest
    needs: [setup, migrate-schema-postgres, migrate-db-full]
    if: |
      needs.setup.outputs.run_deploy == 'true' &&
      needs.setup.outputs.deploy_mode == 'gcp-cutover' &&
      needs.migrate-schema-postgres.result == 'success' &&
      (needs.migrate-db-full.result == 'success' ||
        (needs.setup.outputs.skip_ydb_migration == 'true' && needs.migrate-db-full.result == 'skipped'))
    environment: ${{ needs.setup.outputs.workspace }}
    outputs:
      data_bucket_name: ${{ steps.outputs.outputs.data_bucket_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Write GCP credentials
        run: echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Export deploy service account email
        run: echo "DEPLOY_SA_EMAIL=$(jq -r .client_email gcp-sa.json)" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Prepare GCP function modules
        run: |
          for fn in dispatcher reminder loader; do
            (cd "serverless/${fn}/function" && go mod tidy && go mod vendor)
          done

      - name: Terraform Init
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          terraform init \
            -backend-config="bucket=${GCP_TFSTATE_BUCKET}" \
            -backend-config="prefix=prayer-bot/infra-${{ needs.setup.outputs.workspace }}"

      - name: Terraform Apply (loader trigger disabled)
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_environment: ${{ needs.setup.outputs.workspace }}
          TF_VAR_enable_loader_trigger: false
          TF_VAR_enable_scheduler: false
          TF_VAR_dual_write: true
          TF_VAR_supabase_db_url: ${{ secrets.SUPABASE_DB_URL }}
          TF_VAR_ydb_token: ${{ secrets.YDB_TOKEN_FOR_GCP }}
          TF_VAR_deploy_service_account_email: ${{ env.DEPLOY_SA_EMAIL }}
        run: terraform apply -auto-approve

      - name: Export outputs
        id: outputs
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          echo "data_bucket_name=$(terraform output -raw data_bucket_name)" >> $GITHUB_OUTPUT

  deploy-gcp-infra-only:
    name: Deploy GCP Infrastructure (gcp-only)
    runs-on: ubuntu-latest
    needs: [setup, migrate-schema-postgres]
    if: needs.setup.outputs.run_deploy == 'true' && needs.setup.outputs.deploy_mode == 'gcp-only'
    environment: ${{ needs.setup.outputs.workspace }}
    outputs:
      dispatcher_url: ${{ steps.outputs.outputs.dispatcher_url }}
      data_bucket_name: ${{ steps.outputs.outputs.data_bucket_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Write GCP credentials
        run: echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Export deploy service account email
        run: echo "DEPLOY_SA_EMAIL=$(jq -r .client_email gcp-sa.json)" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Prepare GCP function modules
        run: |
          for fn in dispatcher reminder loader; do
            (cd "serverless/${fn}/function" && go mod tidy && go mod vendor)
          done

      - name: Terraform Init
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          terraform init \
            -backend-config="bucket=${GCP_TFSTATE_BUCKET}" \
            -backend-config="prefix=prayer-bot/infra-${{ needs.setup.outputs.workspace }}"

      - name: Terraform Apply
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_environment: ${{ needs.setup.outputs.workspace }}
          TF_VAR_enable_loader_trigger: true
          TF_VAR_enable_scheduler: true
          TF_VAR_dual_write: false
          TF_VAR_supabase_db_url: ${{ secrets.SUPABASE_DB_URL }}
          TF_VAR_ydb_token: ""
          TF_VAR_deploy_service_account_email: ${{ env.DEPLOY_SA_EMAIL }}
        run: terraform apply -auto-approve

      - name: Export outputs
        id: outputs
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          echo "dispatcher_url=$(terraform output -raw dispatcher_url)" >> $GITHUB_OUTPUT
          echo "data_bucket_name=$(terraform output -raw data_bucket_name)" >> $GITHUB_OUTPUT

  migrate-storage:
    name: Migrate YC Bucket to GCS
    runs-on: ubuntu-latest
    needs: [setup, deploy-gcp-infra]
    if: needs.setup.outputs.run_deploy == 'true' && needs.setup.outputs.deploy_mode == 'gcp-cutover' && needs.deploy-gcp-infra.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Write GCP credentials
        run: echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Load YC Terraform outputs
        uses: ./.github/actions/load-yc-terraform-outputs
        with:
          workspace: ${{ needs.setup.outputs.workspace }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cloud_id: ${{ secrets.CLOUD_ID }}
          folder_id: ${{ secrets.FOLDER_ID }}

      - name: Copy objects to GCS
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          ENVIRONMENT: ${{ needs.setup.outputs.workspace }}
          GCS_BUCKET: ${{ needs.deploy-gcp-infra.outputs.data_bucket_name }}
        working-directory: _scripts/migrate-bucket-to-gcs
        run: go run .

  deploy-gcp-functions:
    name: Deploy GCP Functions (phase 2)
    runs-on: ubuntu-latest
    needs: [setup, deploy-gcp-infra, migrate-storage]
    if: needs.setup.outputs.run_deploy == 'true' && needs.setup.outputs.deploy_mode == 'gcp-cutover' && needs.migrate-storage.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    outputs:
      dispatcher_url: ${{ steps.outputs.outputs.dispatcher_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Write GCP credentials
        run: echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Export deploy service account email
        run: echo "DEPLOY_SA_EMAIL=$(jq -r .client_email gcp-sa.json)" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Prepare GCP function modules
        run: |
          for fn in dispatcher reminder loader; do
            (cd "serverless/${fn}/function" && go mod tidy && go mod vendor)
          done

      - name: Terraform Init
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          terraform init \
            -backend-config="bucket=${GCP_TFSTATE_BUCKET}" \
            -backend-config="prefix=prayer-bot/infra-${{ needs.setup.outputs.workspace }}"

      - name: Terraform Apply (enable loader trigger)
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_environment: ${{ needs.setup.outputs.workspace }}
          TF_VAR_enable_loader_trigger: true
          TF_VAR_enable_scheduler: true
          TF_VAR_dual_write: true
          TF_VAR_supabase_db_url: ${{ secrets.SUPABASE_DB_URL }}
          TF_VAR_ydb_token: ${{ secrets.YDB_TOKEN_FOR_GCP }}
          TF_VAR_deploy_service_account_email: ${{ env.DEPLOY_SA_EMAIL }}
        run: terraform apply -auto-approve

      - name: Export outputs
        id: outputs
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          echo "dispatcher_url=$(terraform output -raw dispatcher_url)" >> $GITHUB_OUTPUT

  migrate-db-incremental:
    name: Migrate YDB to Supabase (incremental)
    runs-on: ubuntu-latest
    needs: [setup, deploy-gcp-functions]
    if: |
      needs.setup.outputs.run_deploy == 'true' &&
      needs.setup.outputs.deploy_mode == 'gcp-cutover' &&
      needs.setup.outputs.skip_ydb_migration != 'true' &&
      needs.deploy-gcp-functions.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "${HOME}/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate YC CLI
        env:
          YC_SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          YC_CLOUD_ID: ${{ secrets.CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.FOLDER_ID }}
        run: |
          echo "$YC_SERVICE_ACCOUNT_KEY" > iam.json
          yc config set service-account-key iam.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Generate short-lived IAM token
        run: |
          export YDB_ACCESS_TOKEN=$(yc iam create-token)
          echo "YDB_ACCESS_TOKEN=$YDB_ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Load YC Terraform outputs
        uses: ./.github/actions/load-yc-terraform-outputs
        with:
          workspace: ${{ needs.setup.outputs.workspace }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cloud_id: ${{ secrets.CLOUD_ID }}
          folder_id: ${{ secrets.FOLDER_ID }}

      - name: Run incremental database migration
        env:
          YDB_ENDPOINT: ${{ env.YDB_ENDPOINT }}
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          YDB_TOKEN: ${{ env.YDB_ACCESS_TOKEN }}
        working-directory: _scripts/migrate-ydb-to-supabase
        run: go run . --mode=incremental

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: ${{ needs.setup.outputs.workspace }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ needs.setup.outputs.cache_key }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [setup, lint, validate]
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: ${{ needs.setup.outputs.workspace }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ needs.setup.outputs.cache_key }}

      - name: Terraform Plan
        env:
          TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
        run: terraform plan -no-color 2>&1 | tee plan_output.txt

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = planOutput.length > 65000
              ? planOutput.slice(0, 65000) + '\n\n...(truncated — see full output in the workflow run)'
              : planOutput;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`dev\`\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Add plan to workflow summary
        run: |
          echo "## Terraform Plan — \`${{ needs.setup.outputs.workspace }}\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [setup, plan, migrate]
    if: needs.setup.outputs.run_deploy == 'true' && needs.setup.outputs.deploy_mode == 'legacy' && needs.plan.result == 'success' && needs.migrate.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    outputs:
      dispatcher_function_id: ${{ steps.outputs.outputs.dispatcher_function_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: 'false'
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: ${{ needs.setup.outputs.workspace }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ needs.setup.outputs.cache_key }}

      - name: Backup current state
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          mkdir -p state-backups
          terraform state pull > state-backups/terraform-${{ needs.setup.outputs.workspace }}-${TIMESTAMP}-${{ github.run_id }}.tfstate

      - name: Upload state backup
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-backup-${{ needs.setup.outputs.workspace }}-${{ github.run_id }}
          path: state-backups/
          retention-days: 90

      - name: Terraform Apply
        env:
          TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
        run: terraform apply -auto-approve
        continue-on-error: false

      - name: Export Terraform Outputs
        id: outputs
        run: |
          DISPATCHER_FUNCTION_ID=$(terraform output -raw dispatcher_function_id)
          echo "dispatcher_function_id=$DISPATCHER_FUNCTION_ID" >> $GITHUB_OUTPUT
          echo "::notice::Dispatcher Function ID: $DISPATCHER_FUNCTION_ID"

  proxy:
    name: Terraform Proxy Apply
    runs-on: ubuntu-latest
    needs: [setup, apply]
    if: needs.setup.outputs.run_deploy == 'true' && needs.setup.outputs.deploy_mode == 'legacy' && needs.apply.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    outputs:
      webhook_url: ${{ steps.outputs.outputs.webhook_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Write GCP credentials
        run: |
          echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Terraform Init
        working-directory: proxy/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          terraform init \
            -backend-config="bucket=${GCP_TFSTATE_BUCKET}" \
            -backend-config="prefix=prayer-bot/proxy"

      - name: Terraform Apply
        working-directory: proxy/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          TF_VAR_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_environment: ${{ needs.setup.outputs.workspace }}
          TF_VAR_yc_dispatcher_url: https://functions.yandexcloud.net/${{ needs.apply.outputs.dispatcher_function_id }}
        run: terraform apply -auto-approve

      - name: Export Terraform Outputs
        id: outputs
        working-directory: proxy/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          WEBHOOK_URL=$(terraform output -raw webhook_url)
          echo "webhook_url=$WEBHOOK_URL" >> $GITHUB_OUTPUT
          echo "::notice::Webhook URL: $WEBHOOK_URL"

  hook:
    name: Setup Telegram Webhooks
    runs-on: ubuntu-latest
    needs:
      - setup
      - apply
      - proxy
      - deploy-gcp-functions
      - migrate-db-incremental
      - deploy-gcp-infra-only
    # always(): upstream jobs skipped in GCP modes (apply, proxy, etc.) must not block this job
    if: |
      needs.setup.outputs.run_deploy == 'true' &&
      always() &&
      !cancelled() &&
      (
        (needs.setup.outputs.deploy_mode == 'legacy' && needs.apply.result == 'success') ||
        (needs.setup.outputs.deploy_mode == 'gcp-cutover' && needs.deploy-gcp-functions.result == 'success') ||
        (needs.setup.outputs.deploy_mode == 'gcp-only' && needs.deploy-gcp-infra-only.result == 'success')
      )
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Write GCP credentials
        if: needs.setup.outputs.deploy_mode != 'legacy'
        run: echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Get Dispatcher Function ID
        if: needs.setup.outputs.deploy_mode == 'legacy'
        run: |
          DISPATCHER_FUNCTION_ID="${{ needs.apply.outputs.dispatcher_function_id }}"
          echo "DISPATCHER_FUNCTION_ID=$DISPATCHER_FUNCTION_ID" >> $GITHUB_ENV
          echo "::notice::Dispatcher Function ID: $DISPATCHER_FUNCTION_ID"

      - name: Get webhook URL
        run: |
          DEPLOY_MODE="${{ needs.setup.outputs.deploy_mode }}"
          if [ "$DEPLOY_MODE" = "legacy" ]; then
            WEBHOOK_URL="${{ needs.proxy.outputs.webhook_url }}"
          elif [ "$DEPLOY_MODE" = "gcp-only" ]; then
            WEBHOOK_URL="${{ needs.deploy-gcp-infra-only.outputs.dispatcher_url }}"
          else
            WEBHOOK_URL="${{ needs.deploy-gcp-functions.outputs.dispatcher_url }}"
          fi
          echo "WEBHOOK_URL=$WEBHOOK_URL" >> $GITHUB_ENV

      - name: Resolve webhook URL from Terraform
        if: needs.setup.outputs.deploy_mode != 'legacy'
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            echo "::notice::Webhook URL from deploy job: $WEBHOOK_URL"
            exit 0
          fi
          terraform init \
            -backend-config="bucket=${GCP_TFSTATE_BUCKET}" \
            -backend-config="prefix=prayer-bot/infra-${{ needs.setup.outputs.workspace }}"
          WEBHOOK_URL="$(terraform output -raw dispatcher_url)"
          echo "WEBHOOK_URL=$WEBHOOK_URL" >> $GITHUB_ENV
          echo "::notice::Webhook URL from Terraform: $WEBHOOK_URL"

      - name: Validate webhook URL
        if: needs.setup.outputs.deploy_mode != 'legacy'
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::WEBHOOK_URL is empty — cannot register Telegram webhooks"
            exit 1
          fi
          if echo "$WEBHOOK_URL" | grep -q 'webhook-proxy'; then
            echo "::error::WEBHOOK_URL must be the GCP dispatcher, not the legacy proxy: $WEBHOOK_URL"
            exit 1
          fi
          echo "::notice::Registering Telegram webhooks at: $WEBHOOK_URL"

      - name: Execute webhook setup script
        env:
          REJECT_PROXY_WEBHOOK: ${{ needs.setup.outputs.deploy_mode != 'legacy' && '1' || '0' }}
        run: |
          chmod +x _scripts/hook.sh
          bash _scripts/hook.sh
        continue-on-error: false

  profile:
    name: Sync Telegram Profiles
    runs-on: ubuntu-latest
    needs: [setup, apply, deploy-gcp-functions, deploy-gcp-infra-only]
    if: |
      needs.setup.outputs.run_deploy == 'true' &&
      always() &&
      !cancelled() &&
      (
        (needs.setup.outputs.deploy_mode == 'legacy' && needs.apply.result == 'success') ||
        (needs.setup.outputs.deploy_mode == 'gcp-cutover' && needs.deploy-gcp-functions.result == 'success') ||
        (needs.setup.outputs.deploy_mode == 'gcp-only' && needs.deploy-gcp-infra-only.result == 'success')
      )
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.ref_name }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-go-

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Sync Telegram bot profiles
        working-directory: serverless/dispatcher
        run: go run ./cmd/syncprofile -config "${{ github.workspace }}/config.json"

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - setup
      - lint
      - migrate
      - validate
      - plan
      - apply
      - proxy
      - hook
      - profile
      - freeze-yc-cron
      - migrate-schema-postgres
      - migrate-db-full
      - deploy-gcp-infra
      - migrate-storage
      - deploy-gcp-functions
      - migrate-db-incremental
      - deploy-gcp-infra-only
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Deployment Summary — \`${{ needs.setup.outputs.workspace }}\` environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy mode:** \`${{ needs.setup.outputs.deploy_mode }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.setup.outputs.skip_ydb_migration }}" = "true" ]; then
            echo "**YDB → Supabase data migration:** skipped" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Migration (legacy) | ${{ needs.migrate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Plan | ${{ needs.plan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Apply (YC) | ${{ needs.apply.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Proxy Apply | ${{ needs.proxy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Freeze YC Cron | ${{ needs.freeze-yc-cron.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Postgres Schema (Goose) | ${{ needs.migrate-schema-postgres.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YDB → Supabase (full) | ${{ needs.migrate-db-full.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GCP Infra (phase 1) | ${{ needs.deploy-gcp-infra.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bucket → GCS | ${{ needs.migrate-storage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GCP Functions (phase 2) | ${{ needs.deploy-gcp-functions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YDB → Supabase (incremental) | ${{ needs.migrate-db-incremental.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GCP Infra (gcp-only) | ${{ needs.deploy-gcp-infra-only.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Webhook Setup | ${{ needs.hook.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Telegram Profiles | ${{ needs.profile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workspace:** ${{ needs.setup.outputs.workspace }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.proxy.outputs.webhook_url }}" != "" ]; then
            echo "**Webhook URL (proxy):** ${{ needs.proxy.outputs.webhook_url }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-gcp-functions.outputs.dispatcher_url }}" != "" ]; then
            echo "**Webhook URL (GCP):** ${{ needs.deploy-gcp-functions.outputs.dispatcher_url }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-gcp-infra-only.outputs.dispatcher_url }}" != "" ]; then
            echo "**Webhook URL (GCP gcp-only):** ${{ needs.deploy-gcp-infra-only.outputs.dispatcher_url }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.apply.outputs.dispatcher_function_id }}" != "" ]; then
            echo "**Dispatcher Function ID (YC):** ${{ needs.apply.outputs.dispatcher_function_id }}" >> $GITHUB_STEP_SUMMARY
          fi
