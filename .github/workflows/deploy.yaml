name: Deploy to GCP

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - prod
          - dev

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || (github.event_name == 'workflow_dispatch' && inputs.environment || 'prod') }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: 1.6.3
  GOOSE_VERSION: 3.26.0
  GO_VERSION: 1.25
  APP_CONFIG_PATH: config.json
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  GCP_TFSTATE_BUCKET: ${{ secrets.GCP_TFSTATE_BUCKET }}
  GCP_REGION: europe-west1

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && 'dev' || (github.event_name == 'workflow_dispatch' && inputs.environment || 'prod') }}
    outputs:
      workspace: ${{ steps.set-workspace.outputs.workspace }}
      run_deploy: ${{ steps.set-workspace.outputs.run_deploy }}
    steps:
      - name: Set workspace
        id: set-workspace
        run: |
          WORKSPACE=${{ github.event_name == 'pull_request' && 'dev' || (github.event_name == 'workflow_dispatch' && inputs.environment || 'prod') }}
          RUN_DEPLOY=${{ github.event_name == 'workflow_dispatch' }}
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "run_deploy=$RUN_DEPLOY" >> $GITHUB_OUTPUT
          echo "::notice::Workspace: $WORKSPACE"

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.ref_name }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-go-

      - name: Install revive
        run: go install github.com/mgechev/revive@latest

      - name: Run revive
        run: revive -config revive.toml -formatter friendly ./...

      - name: Test shared db package
        run: go test ./internal/db/...

      - name: Test dispatcher
        run: go test ./...
        working-directory: serverless/dispatcher

      - name: Test reminder
        run: go test ./...
        working-directory: serverless/reminder

      - name: Test loader
        run: go test ./...
        working-directory: serverless/loader

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Write GCP credentials
        run: echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          terraform init \
            -backend-config="bucket=${GCP_TFSTATE_BUCKET}" \
            -backend-config="prefix=prayer-bot/infra-${{ needs.setup.outputs.workspace }}"

      - name: Terraform Validate
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [setup, lint, validate]
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Write GCP credentials
        run: echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Prepare GCP function modules
        run: |
          for fn in dispatcher reminder loader; do
            (cd "serverless/${fn}" && go mod tidy && go mod vendor)
          done

      - name: Terraform Init
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          terraform init \
            -backend-config="bucket=${GCP_TFSTATE_BUCKET}" \
            -backend-config="prefix=prayer-bot/infra-${{ needs.setup.outputs.workspace }}"

      - name: Terraform Plan
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          TF_VAR_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_environment: ${{ needs.setup.outputs.workspace }}
          TF_VAR_supabase_db_url: ${{ secrets.SUPABASE_DB_URL }}
        run: terraform plan -no-color 2>&1 | tee "${{ github.workspace }}/plan_output.txt"

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = planOutput.length > 65000
              ? planOutput.slice(0, 65000) + '\n\n...(truncated — see full output in the workflow run)'
              : planOutput;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`dev\`\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Add plan to workflow summary
        run: |
          echo "## Terraform Plan — \`${{ needs.setup.outputs.workspace }}\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat "${{ github.workspace }}/plan_output.txt" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  migrate-schema:
    name: Postgres Schema Migration
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.run_deploy == 'true'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Goose
        run: |
          GOOSE_VERSION="${{ env.GOOSE_VERSION }}"
          wget -q "https://github.com/pressly/goose/releases/download/v${GOOSE_VERSION}/goose_linux_x86_64" -O goose
          chmod +x goose
          mkdir -p $HOME/.goose
          mv goose $HOME/.goose/
          echo "$HOME/.goose" >> $GITHUB_PATH

      - name: Run Postgres Goose migrations
        env:
          GOOSE_DRIVER: postgres
          GOOSE_DBSTRING: ${{ secrets.SUPABASE_DB_DIRECT_URL }}
        run: |
          export PATH="$HOME/.goose:$PATH"
          cd migrations
          goose up

  deploy-gcp:
    name: Deploy GCP Infrastructure
    runs-on: ubuntu-latest
    needs: [setup, migrate-schema]
    if: needs.setup.outputs.run_deploy == 'true'
    environment: ${{ needs.setup.outputs.workspace }}
    outputs:
      dispatcher_url: ${{ steps.outputs.outputs.dispatcher_url }}
      data_bucket_name: ${{ steps.outputs.outputs.data_bucket_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Write GCP credentials
        run: echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Export deploy service account email
        run: echo "DEPLOY_SA_EMAIL=$(jq -r .client_email gcp-sa.json)" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Prepare GCP function modules
        run: |
          for fn in dispatcher reminder loader; do
            (cd "serverless/${fn}" && go mod tidy && go mod vendor)
          done

      - name: Terraform Init
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          terraform init \
            -backend-config="bucket=${GCP_TFSTATE_BUCKET}" \
            -backend-config="prefix=prayer-bot/infra-${{ needs.setup.outputs.workspace }}"

      - name: Terraform Apply
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          TF_VAR_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_environment: ${{ needs.setup.outputs.workspace }}
          TF_VAR_enable_loader_trigger: true
          TF_VAR_enable_scheduler: true
          TF_VAR_supabase_db_url: ${{ secrets.SUPABASE_DB_URL }}
          TF_VAR_deploy_service_account_email: ${{ env.DEPLOY_SA_EMAIL }}
        run: terraform apply -auto-approve

      - name: Export outputs
        id: outputs
        working-directory: infra/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          echo "dispatcher_url=$(terraform output -raw dispatcher_url)" >> $GITHUB_OUTPUT
          echo "data_bucket_name=$(terraform output -raw data_bucket_name)" >> $GITHUB_OUTPUT

  hook:
    name: Setup Telegram Webhooks
    runs-on: ubuntu-latest
    needs: [setup, deploy-gcp]
    if: needs.setup.outputs.run_deploy == 'true' && needs.deploy-gcp.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Set webhook URL
        run: |
          WEBHOOK_URL="${{ needs.deploy-gcp.outputs.dispatcher_url }}"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::WEBHOOK_URL is empty — cannot register Telegram webhooks"
            exit 1
          fi
          echo "WEBHOOK_URL=$WEBHOOK_URL" >> $GITHUB_ENV
          echo "::notice::Registering Telegram webhooks at: $WEBHOOK_URL"

      - name: Execute webhook setup script
        run: |
          chmod +x _scripts/hook.sh
          bash _scripts/hook.sh

  profile:
    name: Sync Telegram Profiles
    runs-on: ubuntu-latest
    needs: [setup, deploy-gcp]
    if: needs.setup.outputs.run_deploy == 'true' && needs.deploy-gcp.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.ref_name }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-go-

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Sync Telegram bot profiles
        working-directory: serverless/dispatcher
        run: go run ./cmd/syncprofile -config "${{ github.workspace }}/config.json"

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - setup
      - lint
      - validate
      - plan
      - migrate-schema
      - deploy-gcp
      - hook
      - profile
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Deployment Summary — \`${{ needs.setup.outputs.workspace }}\` environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Plan | ${{ needs.plan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Postgres Schema (Goose) | ${{ needs.migrate-schema.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy GCP | ${{ needs.deploy-gcp.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Telegram Webhooks | ${{ needs.hook.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bot Profiles | ${{ needs.profile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy-gcp.outputs.dispatcher_url }}" != "" ]; then
            echo "**Webhook URL (GCP):** ${{ needs.deploy-gcp.outputs.dispatcher_url }}" >> $GITHUB_STEP_SUMMARY
          fi
