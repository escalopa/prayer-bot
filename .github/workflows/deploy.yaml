name: Deploy to Yandex Cloud

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - prod
          - dev

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || (github.event_name == 'workflow_dispatch' && inputs.environment || 'prod') }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: 1.6.3
  GOOSE_VERSION: 3.26.0
  GO_VERSION: 1.21
  APP_CONFIG_PATH: config.json
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  GCP_TFSTATE_BUCKET: ${{ secrets.GCP_TFSTATE_BUCKET }}
  GCP_REGION: europe-west1

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request' && 'dev' || (github.event_name == 'workflow_dispatch' && inputs.environment || 'prod') }}
    outputs:
      cache_key: ${{ steps.set-cache-key.outputs.cache_key }}
      workspace: ${{ steps.set-workspace.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set workspace
        id: set-workspace
        run: |
          WORKSPACE=${{ github.event_name == 'pull_request' && 'dev' || (github.event_name == 'workflow_dispatch' && inputs.environment || 'prod') }}
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "::notice::Workspace: $WORKSPACE"

      - name: Set cache key
        id: set-cache-key
        run: |
          CACHE_KEY="${{ runner.os }}-${{ steps.set-workspace.outputs.workspace }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}"
          echo "cache_key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "::notice::Cache key: $CACHE_KEY"

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: ${{ steps.set-workspace.outputs.workspace }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ steps.set-cache-key.outputs.cache_key }}

  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.ref_name }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-go-

      - name: Install revive
        run: go install github.com/mgechev/revive@latest

      - name: Run revive
        run: revive -config revive.toml -formatter friendly ./...

  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install YC CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "${HOME}/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Authenticate YC CLI
        env:
          YC_SERVICE_ACCOUNT_KEY: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          YC_CLOUD_ID: ${{ secrets.CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.FOLDER_ID }}
        run: |
          echo "$YC_SERVICE_ACCOUNT_KEY" > iam.json
          yc config set service-account-key iam.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Generate short-lived IAM token
        run: |
          export YDB_ACCESS_TOKEN=$(yc iam create-token)
          echo "YDB_ACCESS_TOKEN=$YDB_ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Install Goose
        run: |
          GOOSE_VERSION="${{ env.GOOSE_VERSION }}"
          wget -q "https://github.com/pressly/goose/releases/download/v${GOOSE_VERSION}/goose_linux_x86_64" -O goose
          chmod +x goose
          mkdir -p $HOME/.goose
          mv goose $HOME/.goose/
          echo "$HOME/.goose" >> $GITHUB_PATH

      - name: Run Goose migrations
        env:
          GOOSE_DRIVER: ydb
          GOOSE_DBSTRING_BASE: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          export PATH="$HOME/.goose:$PATH"
          cd migrations
          GOOSE_DBSTRING="${GOOSE_DBSTRING_BASE}&token=${YDB_ACCESS_TOKEN}&go_query_mode=scripting&go_fake_tx=scripting&go_query_bind=declare,numeric"
          export GOOSE_DBSTRING
          echo "::notice::Running Goose migrations for ${{ needs.setup.outputs.workspace }} environment"
          goose up
        continue-on-error: false

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: ${{ needs.setup.outputs.workspace }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ needs.setup.outputs.cache_key }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [setup, lint, validate]
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: ${{ needs.setup.outputs.workspace }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ needs.setup.outputs.cache_key }}

      - name: Terraform Plan
        env:
          TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
        run: terraform plan -no-color 2>&1 | tee plan_output.txt

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = planOutput.length > 65000
              ? planOutput.slice(0, 65000) + '\n\n...(truncated — see full output in the workflow run)'
              : planOutput;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`dev\`\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Add plan to workflow summary
        run: |
          echo "## Terraform Plan — \`${{ needs.setup.outputs.workspace }}\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [setup, plan, migrate]
    if: needs.plan.result == 'success' && needs.migrate.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    outputs:
      dispatcher_function_id: ${{ steps.outputs.outputs.dispatcher_function_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform Environment
        uses: ./.github/actions/setup-terraform
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: 'false'
          service_account_key: ${{ secrets.SERVICE_ACCOUNT_KEY }}
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}
          workspace: ${{ needs.setup.outputs.workspace }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          cache_key: ${{ needs.setup.outputs.cache_key }}

      - name: Backup current state
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          mkdir -p state-backups
          terraform state pull > state-backups/terraform-${{ needs.setup.outputs.workspace }}-${TIMESTAMP}-${{ github.run_id }}.tfstate

      - name: Upload state backup
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-backup-${{ needs.setup.outputs.workspace }}-${{ github.run_id }}
          path: state-backups/
          retention-days: 90

      - name: Terraform Apply
        env:
          TF_VAR_cloud_id: ${{ secrets.CLOUD_ID }}
          TF_VAR_folder_id: ${{ secrets.FOLDER_ID }}
        run: terraform apply -auto-approve
        continue-on-error: false

      - name: Export Terraform Outputs
        id: outputs
        run: |
          DISPATCHER_FUNCTION_ID=$(terraform output -raw dispatcher_function_id)
          echo "dispatcher_function_id=$DISPATCHER_FUNCTION_ID" >> $GITHUB_OUTPUT
          echo "::notice::Dispatcher Function ID: $DISPATCHER_FUNCTION_ID"

  proxy:
    name: Terraform Proxy Apply
    runs-on: ubuntu-latest
    needs: [setup, apply]
    environment: ${{ needs.setup.outputs.workspace }}
    outputs:
      webhook_url: ${{ steps.outputs.outputs.webhook_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Write GCP credentials
        run: |
          echo '${{ env.GCP_SA_KEY }}' > gcp-sa.json

      - name: Terraform Init
        working-directory: proxy/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          terraform init \
            -backend-config="bucket=${GCP_TFSTATE_BUCKET}" \
            -backend-config="prefix=prayer-bot/proxy"

      - name: Terraform Apply
        working-directory: proxy/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          TF_VAR_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_environment: ${{ needs.setup.outputs.workspace }}
          TF_VAR_yc_dispatcher_url: https://functions.yandexcloud.net/${{ needs.apply.outputs.dispatcher_function_id }}
        run: terraform apply -auto-approve

      - name: Export Terraform Outputs
        id: outputs
        working-directory: proxy/gcp
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
        run: |
          WEBHOOK_URL=$(terraform output -raw webhook_url)
          echo "webhook_url=$WEBHOOK_URL" >> $GITHUB_OUTPUT
          echo "::notice::Webhook URL: $WEBHOOK_URL"

  hook:
    name: Setup Telegram Webhooks
    runs-on: ubuntu-latest
    needs: [setup, apply, proxy]
    if: needs.apply.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Get Dispatcher Function ID
        run: |
          DISPATCHER_FUNCTION_ID="${{ needs.apply.outputs.dispatcher_function_id }}"
          echo "DISPATCHER_FUNCTION_ID=$DISPATCHER_FUNCTION_ID" >> $GITHUB_ENV
          echo "::notice::Dispatcher Function ID: $DISPATCHER_FUNCTION_ID"

      - name: Get webhook URL
        run: |
          WEBHOOK_URL="${{ needs.proxy.outputs.webhook_url }}"
          echo "WEBHOOK_URL=$WEBHOOK_URL" >> $GITHUB_ENV
          if [ -n "$WEBHOOK_URL" ]; then
            echo "::notice::Webhook URL: $WEBHOOK_URL"
          fi

      - name: Execute webhook setup script
        run: |
          chmod +x _scripts/hook.sh
          bash _scripts/hook.sh
        continue-on-error: false

  profile:
    name: Sync Telegram Profiles
    runs-on: ubuntu-latest
    needs: [setup, apply]
    if: needs.apply.result == 'success'
    environment: ${{ needs.setup.outputs.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ github.ref_name }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-go-

      - name: Load application config
        uses: ./.github/actions/load-config
        with:
          app_config: ${{ secrets.APP_CONFIG }}
          app_config_path: ${{ env.APP_CONFIG_PATH }}

      - name: Sync Telegram bot profiles
        working-directory: serverless/dispatcher
        run: go run ./cmd/syncprofile -config "${{ github.workspace }}/config.json"

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [setup, lint, migrate, validate, plan, apply, proxy, hook, profile]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Deployment Summary — \`${{ needs.setup.outputs.workspace }}\` environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Migration | ${{ needs.migrate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Plan | ${{ needs.plan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Apply | ${{ needs.apply.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Proxy Apply | ${{ needs.proxy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Webhook Setup | ${{ needs.hook.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Telegram Profiles | ${{ needs.profile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Workspace:** ${{ needs.setup.outputs.workspace }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.proxy.outputs.webhook_url }}" != "" ]; then
            echo "**Webhook URL:** ${{ needs.proxy.outputs.webhook_url }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.apply.outputs.dispatcher_function_id }}" != "" ]; then
            echo "**Dispatcher Function ID:** ${{ needs.apply.outputs.dispatcher_function_id }}" >> $GITHUB_STEP_SUMMARY
          fi
