name: Global bot CI

on:
  pull_request:
    paths:
      - 'global/**'
      - '.github/workflows/global-*.yaml'
  push:
    branches: [main]
    paths:
      - 'global/**'
      - '.github/workflows/global-*.yaml'

permissions:
  contents: read

jobs:
  test:
    name: Go tests and container build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: global/go.sum
      - run: gofmt -d cmd internal | tee /tmp/gofmt.diff && test ! -s /tmp/gofmt.diff
      - run: go vet ./...
      - run: go test -race ./...
      - run: docker build -t global-prayer-bot:test .

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global/infra/gcp
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.13.3'
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  summary:
    name: Global CI summary
    runs-on: ubuntu-latest
    needs: [test, terraform]
    if: always()
    steps:
      - name: Write workflow summary
        run: |
          {
            echo "## Global bot CI"
            echo
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Go tests and container build | ${{ needs.test.result }} |"
            echo "| Terraform validation | ${{ needs.terraform.result }} |"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
