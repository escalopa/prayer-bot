help: |
  هل تحتاج مساعدة؟ 😊 إليك ما يمكنني فعله: 👇

  *الصلاة:*

  ⏰ /today – مواقيت اليوم
  🌅 /tomorrow – مواقيت الغد
  📅 /date – مواقيت يوم محدد
  ⏳ /next – متى الصلاة القادمة؟
  📨 /remind – إعدادات التذكير

  *الإعدادات:*

  🌐 /language – تغيير اللغة

  *الدعم:*

  📖 /help – عرض هذا الدليل
  🐞 /bug – الإبلاغ عن مشكلة
  💬 /feedback – إرسال ملاحظات

feedback:
  start: "💬 شاركنا برأيك! (أو اكتب /cancel للإلغاء)"
  success: "✅ شكراً لك! تم إرسال ملاحظاتك"

bug:
  start: "🐞 صِف المشكلة التي واجهتك (أو /cancel للإلغاء)"
  success: "✅ شكراً! تم استلام تقريرك"

help_admin: |
  📊 /info – عرض معلومات وإعدادات المحادثة
  📩 /reply – الرد على المستخدمين
  📈 /stats – إحصائيات استخدام البوت
  📢 /announce – إرسال رسالة للجميع

