help: |
  ¿Necesitas ayuda? 😊 Aquí está lo que puedo hacer: 👇

  *Oraciones:*

  ⏰ /today – Horarios de hoy
  🌅 /tomorrow – Horarios de mañana
  📅 /date – Horarios de un día específico
  ⏳ /next – ¿Cuándo es la próxima oración?
  📨 /remind – Configurar recordatorios

  *Configuraciones:*

  🌐 /language – Cambiar idioma

  *Soporte:*

  📖 /help – Mostrar esta guía
  🐞 /bug – Reportar un problema
  💬 /feedback – Enviar retroalimentación

feedback:
  start: "💬 ¡Comparte tu opinión\\! \\(o escribe /cancel para cancelar\\)"
  success: "✅ ¡Gracias\\! Tu opinión ha sido enviada"

bug:
  start: "🐞 Describe el error encontrado \\(o escribe /cancel para cancelar\\)"
  success: "✅ ¡Gracias\\! Tu reporte ha sido recibido"

help_admin: |
  📊 /info – Ver información y configuración del chat
  📩 /reply – Responder a los usuarios
  📈 /stats – Estadísticas del bot
  📢 /announce – Enviar un mensaje a todos

