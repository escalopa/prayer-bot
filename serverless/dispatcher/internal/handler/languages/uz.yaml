help: |
  Yordam kerakmi? 😊 Men quyidagilarni bajara olaman: 👇

  *Namozlar:*

  ⏰ /today – Bugungi vaqtlar
  🌅 /tomorrow – Ertangi vaqtlar
  📅 /date – Tanlangan kun uchun vaqtlar
  ⏳ /next – Keyingi namoz qachon?
  📨 /remind – Eslatmalarni sozlash

  *Sozlamalar:*

  🌐 /language – Tilni o'zgartirish

  *Yordam:*

  📖 /help – Ushbu qo'llanmani ko'rsatish
  🐞 /bug – Xatolik haqida xabar berish
  💬 /feedback – Fikr-mulohaza yuborish

feedback:
  start: "💬 Fikr-mulohazangizni yuboring! (/cancel yozib to‘xtatish mumkin)"
  success: "✅ Rahmat! Fikringiz yuborildi"

bug:
  start: "🐞 Topilgan xatolikni ta’riflab bering (/cancel yozib to‘xtatish mumkin)"
  success: "✅ Rahmat! Xatolik qabul qilindi"

